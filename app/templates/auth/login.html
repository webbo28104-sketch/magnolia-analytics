{% extends 'base.html' %}
{% block title %}Sign In — Magnolia Analytics{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Welcome back</h1>
      <p class="auth-subtitle">Sign in to your Magnolia account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.login') }}" class="auth-form">

      <div class="form-group">
        <label for="email" class="form-label">Email address</label>
        <input type="email" id="email" name="email" class="form-input"
               placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input"
               placeholder="••••••••" required autocomplete="current-password">
      </div>

      <div class="form-group form-group--inline">
        <label class="form-label form-label--checkbox">
          <input type="checkbox" name="remember_me">
          Remember me
        </label>
        <a href="{{ url_for('auth.forgot_password') }}" class="auth-link--muted">Forgot your password?</a>
      </div>

      <button type="submit" class="btn btn--gold btn--full">Sign In</button>
    </form>

  </div>
</section>
{% endblock %}
