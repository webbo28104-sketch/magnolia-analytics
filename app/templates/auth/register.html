{% extends 'base.html' %}
{% block title %}Create Account — Magnolia Analytics{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Start tracking</h1>
      <p class="auth-subtitle">Create your Magnolia Analytics account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">

      <div class="form-row">
        <div class="form-group">
          <label for="first_name" class="form-label">First name</label>
          <input type="text" id="first_name" name="first_name" class="form-input"
                 placeholder="Alex" required autocomplete="given-name">
        </div>
        <div class="form-group">
          <label for="last_name" class="form-label">Last name</label>
          <input type="text" id="last_name" name="last_name" class="form-input"
                 placeholder="Thompson" required autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email address</label>
        <input type="email" id="email" name="email" class="form-input"
               placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password" class="form-input"
                 required autocomplete="new-password">
          <button type="button" class="pw-toggle" aria-label="Show password">
            <svg class="pw-eye" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="pw-eye-off" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm password</label>
        <div class="pw-wrap">
          <input type="password" id="confirm_password" name="confirm_password" class="form-input"
                 required autocomplete="new-password">
          <button type="button" class="pw-toggle" aria-label="Show password">
            <svg class="pw-eye" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            <svg class="pw-eye-off" xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn--gold btn--full">Create Account</button>

    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</section>
{% endblock %}
