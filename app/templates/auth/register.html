{% extends 'base.html' %}
{% block title %}Create Account — Magnolia Analytics{% endblock %}

{% block content %}
<section class="auth-page">
  <div class="auth-card">
    <div class="auth-header">
      <h1 class="auth-title">Start tracking</h1>
      <p class="auth-subtitle">Create your Magnolia Analytics account</p>
    </div>

    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">

      <div class="form-row">
        <div class="form-group">
          <label for="first_name" class="form-label">First name</label>
          <input type="text" id="first_name" name="first_name" class="form-input"
                 placeholder="Charlie" required autocomplete="given-name">
        </div>
        <div class="form-group">
          <label for="last_name" class="form-label">Last name</label>
          <input type="text" id="last_name" name="last_name" class="form-input"
                 placeholder="Smith" required autocomplete="family-name">
        </div>
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email address</label>
        <input type="email" id="email" name="email" class="form-input"
               placeholder="you@example.com" required autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input"
               placeholder="Min. 8 characters" required autocomplete="new-password">
      </div>

      <div class="form-group">
        <label for="confirm_password" class="form-label">Confirm password</label>
        <input type="password" id="confirm_password" name="confirm_password" class="form-input"
               placeholder="••••••••" required autocomplete="new-password">
      </div>

      {% if invite_only %}
      <div class="form-group">
        <label for="invite_code" class="form-label">Invite code</label>
        <input type="text" id="invite_code" name="invite_code" class="form-input"
               placeholder="GOLF-XXXX-XXXX" required autocomplete="off"
               style="text-transform:uppercase; letter-spacing:0.06em;">
      </div>
      {% endif %}

      <button type="submit" class="btn btn--gold btn--full">Create Account</button>

    </form>

    <p class="auth-footer">
      Already have an account?
      <a href="{{ url_for('auth.login') }}">Sign in</a>
    </p>
  </div>
</section>
{% endblock %}
