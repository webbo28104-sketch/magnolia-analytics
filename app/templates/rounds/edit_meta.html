{% extends 'base.html' %}
{% block title %}Edit Round — Magnolia Analytics{% endblock %}

{% block head %}
<style>
  :root {
    --he-green:   #1a2e1a;
    --he-gold:    #c9a84c;
    --he-cream:   #f5f0e8;
    --he-surface: #ffffff;
    --he-border:  #d8d0c0;
    --he-muted:   #7a7060;
    --he-nav:     60px;
  }

  body { background: var(--he-cream) !important; }

  .em-page {
    max-width: 480px;
    margin: 0 auto;
    padding: 1.5rem 1rem 5rem;
    font-family: 'DM Sans', system-ui, sans-serif;
  }

  .em-header {
    background: var(--he-green);
    color: #fff;
    text-align: center;
    padding: 1.25rem 1rem;
    margin: 0 -1rem 1.75rem;
    box-shadow: 0 2px 8px rgba(0,0,0,.25);
  }

  .em-header h1 { margin: 0; font-size: 1.15rem; font-weight: 600; }
  .em-header p  { margin: 0.25rem 0 0; font-size: 0.82rem; color: rgba(255,255,255,.7); }

  .em-card {
    background: var(--he-surface);
    border: 1px solid var(--he-border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
  }

  .em-field { margin-bottom: 1.25rem; }
  .em-field:last-child { margin-bottom: 0; }

  .em-label {
    display: block;
    font-size: 0.8rem;
    font-weight: 600;
    letter-spacing: .04em;
    text-transform: uppercase;
    color: var(--he-muted);
    margin-bottom: 0.4rem;
  }

  .em-input {
    width: 100%;
    box-sizing: border-box;
    padding: 0.6rem 0.75rem;
    border: 1.5px solid var(--he-border);
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    background: #fff;
    color: #1a1a1a;
    transition: border-color .15s;
  }
  .em-input:focus {
    outline: none;
    border-color: var(--he-gold);
  }

  .em-submit {
    display: block;
    width: 100%;
    padding: 0.85rem;
    background: var(--he-gold);
    color: var(--he-green);
    border: none;
    border-radius: 10px;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    margin-top: 1.5rem;
    transition: opacity .15s;
  }
  .em-submit:hover { opacity: .88; }
</style>
{% endblock %}

{% block content %}
<div class="em-page">
  <div class="em-header">
    <h1>Edit Round Details</h1>
    <p>Update date and tee before re-entering scores</p>
  </div>

  <form method="POST">
    <div class="em-card">
      <div class="em-field">
        <label class="em-label" for="date_played">Date played</label>
        <input class="em-input" type="date" id="date_played" name="date_played"
               value="{{ round.date_played.strftime('%Y-%m-%d') if round.date_played else '' }}">
      </div>
      <div class="em-field">
        <label class="em-label" for="tee_set">Tee</label>
        <input class="em-input" type="text" id="tee_set" name="tee_set"
               value="{{ round.tee_set or '' }}"
               placeholder="e.g. White, Yellow, Red">
      </div>
    </div>

    <button type="submit" class="em-submit">Continue to holes →</button>
  </form>
</div>
{% endblock %}
